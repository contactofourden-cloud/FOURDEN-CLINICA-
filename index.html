<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Consulta Clínicas OAuth2</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://apis.google.com/js/api.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Sora,sans-serif;background:#0f0f23;color:#e0e0e0}
#pinOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:9999;display:flex;align-items:center;justify-content:center}
#pinBox{background:#1a1a2e;padding:40px;border-radius:20px;text-align:center;max-width:400px}
#pinInput{width:100%;padding:15px;font-size:24px;text-align:center;border:2px solid #4a4a6a;border-radius:10px;background:#2a2a3e;color:#fff;margin:20px 0;letter-spacing:8px}
.pinBtn{padding:20px;font-size:20px;border:none;border-radius:10px;background:#3a3a5a;color:#fff;cursor:pointer}
#app{display:none}
.header{background:#1a1a2e;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #4a4a6a}
.tab{padding:10px 20px;background:#2a2a3e;border:none;border-radius:8px;color:#e0e0e0;cursor:pointer;margin:0 5px}
.tab.active{background:#6b6b88;color:#fff}
.content{padding:20px}
#q{width:100%;padding:15px;font-size:16px;border:2px solid #4a4a6a;border-radius:10px;background:#2a2a3e;color:#fff;margin-bottom:20px}
.clinic-card{background:#1a1a2e;padding:20px;border-radius:12px;margin-bottom:15px;border:2px solid #3a3a5a;cursor:pointer}
.clinic-name{font-size:18px;font-weight:700;color:#fff;margin-bottom:10px}
.clinic-info{font-size:14px;color:#b0b0b0;margin:5px 0}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-weight:600;margin:5px}
.btn-primary{background:#6b6b88;color:#fff}
#calendar{background:#1a1a2e;border-radius:12px;padding:20px}
.cal-header{display:flex;justify-content:space-between;margin-bottom:20px}
.cal-grid{display:grid;grid-template-columns:60px 1fr;gap:10px}
.cal-hours{display:flex;flex-direction:column}
.cal-hour{height:60px;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;color:#888;font-size:12px}
.cal-events{position:relative;background:#2a2a3e;border-radius:8px;min-height:900px}
.cal-event{position:absolute;border-radius:6px;padding:6px;font-size:12px;cursor:pointer}
#signInBtn{padding:15px 30px;background:#4285f4;color:#fff;border:none;border-radius:10px;cursor:pointer}
#userInfo{display:none;align-items:center;gap:15px}
#signOutBtn{padding:8px 16px;background:#dc2127;color:#fff;border:none;border-radius:6px;cursor:pointer}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-content{background:#1a1a2e;padding:30px;border-radius:15px;max-width:500px}
.color-option{width:40px;height:40px;border-radius:50%;cursor:pointer;border:3px solid transparent;display:inline-block;margin:5px}
.color-option.selected{border-color:#fff}
</style>
</head>
<body>

<div id="pinOverlay">
<div id="pinBox">
<h2 style="color:#fff">🦷 FOURDEN</h2>
<p style="color:#888">PIN</p>
<input type="password" id="pinInput" maxlength="4" autofocus>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px">
<button class="pinBtn" onclick="addPin('1')">1</button>
<button class="pinBtn" onclick="addPin('2')">2</button>
<button class="pinBtn" onclick="addPin('3')">3</button>
<button class="pinBtn" onclick="addPin('4')">4</button>
<button class="pinBtn" onclick="addPin('5')">5</button>
<button class="pinBtn" onclick="addPin('6')">6</button>
<button class="pinBtn" onclick="addPin('7')">7</button>
<button class="pinBtn" onclick="addPin('8')">8</button>
<button class="pinBtn" onclick="addPin('9')">9</button>
<button class="pinBtn" onclick="clearPin()">⌫</button>
<button class="pinBtn" onclick="addPin('0')">0</button>
<button class="pinBtn" onclick="checkPin()">✓</button>
</div>
</div>
</div>

<div id="app">
<div class="header">
<div>
<button class="tab active" onclick="switchTab('clinicas')">🔍 Clínicas</button>
<button class="tab" onclick="switchTab('agenda')">📅 Agenda</button>
</div>
<div>
<button id="signInBtn" onclick="handleAuthClick()">Conectar Calendar</button>
<div id="userInfo">
<span id="userEmail"></span>
<button id="signOutBtn" onclick="handleSignoutClick()">Salir</button>
</div>
</div>
</div>

<div class="content">
<div id="tc-consulta">
<input type="text" id="q" placeholder="🏥 Busca clínica">
<div id="results"></div>
</div>

<div id="tc-agenda" style="display:none">
<div id="calendar">
<div class="cal-header">
<div>
<button class="btn btn-primary" onclick="loadToday()">Hoy</button>
</div>
<div>
<button class="btn btn-primary" onclick="openNewEvent()">+ CITA</button>
</div>
</div>
<div id="calContent"></div>
</div>
</div>
</div>
</div>

<div id="eventModal" class="modal">
<div class="modal-content">
<h3 id="eventTitle" style="color:#fff"></h3>
<div id="colorPicker"></div>
<div style="margin-top:20px">
<button class="btn btn-primary" onclick="saveColor()">💾 GUARDAR</button>
<button class="btn btn-primary" onclick="markAttended()">✓ ATENDIDO</button>
<button class="btn" style="background:#dc2127;color:#fff" onclick="deleteEvent()">🗑</button>
<button class="btn" style="background:#3a3a5a;color:#fff" onclick="closeModal()">Cerrar</button>
</div>
</div>
</div>

function gapiLoaded() {
  gapi.load('client', initGapi);
}

async function initGapi() {
  await gapi.client.init({discoveryDocs: [DISCOVERY_DOC]});
  gapiInited = true;
  checkReady();
}

function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: ''
  });
  gisInited = true;
  checkReady();
}

function checkReady() {
  if (gapiInited && gisInited) {
    document.getElementById('signInBtn').disabled = false;
  }
}

function handleAuthClick() {
  tokenClient.callback = async (resp) => {
    if (resp.error) return;
    document.getElementById('signInBtn').style.display = 'none';
    document.getElementById('userInfo').style.display = 'flex';
    loadCal();
  };
  
  if (gapi.client.getToken() === null) {
    tokenClient.requestAccessToken({prompt: 'consent'});
  } else {
    tokenClient.requestAccessToken({prompt: ''});
  }
}

function handleSignoutClick() {
  const token = gapi.client.getToken();
  if (token) {
    google.accounts.oauth2.revoke(token.access_token);
    gapi.client.setToken('');
    document.getElementById('signInBtn').style.display = 'block';
    document.getElementById('userInfo').style.display = 'none';
  }
}

async function loadCal() {
  var start = new Date();
  start.setHours(0,0,0,0);
  var end = new Date();
  end.setHours(23,59,59,999);
  
  try {
    const resp = await gapi.client.calendar.events.list({
      calendarId: 'primary',
      timeMin: start.toISOString(),
      timeMax: end.toISOString(),
      showDeleted: false,
      singleEvents: true,
      orderBy: 'startTime'
    });
    
    renderCal(resp.result.items || []);
  } catch (err) {
    console.error(err);
  }
}

function renderCal(events) {
  var html = '<div class="cal-grid"><div class="cal-hours">';
  for(var h=7; h<=22; h++) {
    html += '<div class="cal-hour">' + h + ':00</div>';
  }
  html += '</div><div class="cal-events">';
  
  events.forEach(function(ev) {
    var start = new Date(ev.start.dateTime || ev.start.date);
    var end = new Date(ev.end.dateTime || ev.end.date);
    var hour = start.getHours();
    var min = start.getMinutes();
    var top = ((hour - 7) * 60 + min);
    var dur = (end - start) / 60000;
    
    var cid = ev.colorId || '9';
    var bg = COLORS[cid];
    var bor = cid === '8' ? '2px solid #888' : 'none';
    
    html += '<div class="cal-event" style="top:' + top + 'px;height:' + dur + 'px;left:10px;right:10px;background:' + bg + ';border:' + bor + '" data-id="' + ev.id + '" data-summary="' + (ev.summary || '').replace(/"/g, '&quot;') + '" data-color="' + cid + '" onclick="showEv(this)">';
    html += (ev.summary || 'Sin título');
    html += '</div>';
  });
  
  html += '</div></div>';
  document.getElementById('calContent').innerHTML = html;
}

function showEv(el) {
  currentEvent = {
    id: el.getAttribute('data-id'),
    summary: el.getAttribute('data-summary'),
    colorId: el.getAttribute('data-color')
  };
  
  document.getElementById('eventTitle').textContent = currentEvent.summary;
  
  var picker = '';
  for(var i=1; i<=11; i++) {
    var sel = currentEvent.colorId === String(i) ? 'selected' : '';
    picker += '<div class="color-option ' + sel + '" style="background:' + COLORS[i] + '" onclick="selColor(' + i + ')"></div>';
  }
  document.getElementById('colorPicker').innerHTML = picker;
  document.getElementById('eventModal').style.display = 'flex';
}

function selColor(c) {
  currentEvent.colorId = String(c);
  var opts = document.querySelectorAll('.color-option');
  opts.forEach(function(opt, idx) {
    opt.classList.toggle('selected', idx === c - 1);
  });
}

async function saveColor() {
  if (!currentEvent) return;
  try {
    await gapi.client.calendar.events.patch({
      calendarId: 'primary',
      eventId: currentEvent.id,
      resource: {colorId: currentEvent.colorId}
    });
    closeModal();
    loadCal();
  } catch(err) {
    alert('Error');
  }
}

async function markAttended() {
  if (!currentEvent) return;
  currentEvent.colorId = '8';
  await saveColor();
}

async function deleteEvent() {
  if (!currentEvent || !confirm('¿Borrar?')) return;
  try {
    await gapi.client.calendar.events.delete({
      calendarId: 'primary',
      eventId: currentEvent.id
    });
    closeModal();
    loadCal();
  } catch(err) {
    alert('Error');
  }
}

function closeModal() {
  document.getElementById('eventModal').style.display = 'none';
  currentEvent = null;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  
  if(tab === 'clinicas') {
    document.getElementById('tc-consulta').style.display = 'block';
    document.getElementById('tc-agenda').style.display = 'none';
  } else {
    document.getElementById('tc-consulta').style.display = 'none';
    document.getElementById('tc-agenda').style.display = 'block';
    if(gapiInited && gapi.client.getToken()) loadCal();
  }
}

function loadToday() {
  loadCal();
}

function openNewEvent() {
  alert('Crear cita - próximamente');
}

function addPin(n) {
  var inp = document.getElementById('pinInput');
  if(inp.value.length < 4) inp.value += n;
  if(inp.value.length === 4) checkPin();
}

function clearPin() {
  document.getElementById('pinInput').value = '';
}

async function checkPin() {
  var inp = document.getElementById('pinInput').value;
  var hash = await sha256(inp);
  if(hash === PIN_HASH) {
    document.getElementById('pinOverlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    gapiLoaded();
    gisLoaded();
  } else {
    document.getElementById('pinInput').value = '';
    alert('PIN incorrecto');
  }
}

async function sha256(str) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

document.getElementById('q').addEventListener('input', function() {
  var q = this.value.trim().toLowerCase();
  if(!q) {
    document.getElementById('results').innerHTML = '';
    return;
  }
  
  var results = DATA.filter(c => 
    (c['Nombre Clínica'] || '').toLowerCase().includes(q) ||
    (c['Doctor / Ortodoncista'] || '').toLowerCase().includes(q)
  ).slice(0, 10);
  
  var html = '';
  results.forEach(c => {
    html += '<div class="clinic-card">';
    html += '<div class="clinic-name">' + (c['Nombre Clínica'] || 'Sin nombre') + '</div>';
    html += '<div class="clinic-info">👤 ' + (c['Doctor / Ortodoncista'] || '-') + '</div>';
    html += '<div class="clinic-info">📍 ' + (c['Dirección'] || '-') + '</div>';
    html += '</div>';
  });
  
  document.getElementById('results').innerHTML = html;
});
</script>

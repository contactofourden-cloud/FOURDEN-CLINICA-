<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clínicas · Radiología</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#1e2130;--surf:#262b3d;--surf2:#2e3450;--border:#3a4060;
  --accent:#8b78f0;--accent2:#00d4a0;--text:#e8eaf6;--muted:#7b82a8;
  --gold:#ffd166;--blue:#60a5fa;--green:#4ade80;--red:#ff6b6b;--orange:#fb923c;--purple:#c084fc;--teal:#2dd4bf;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
header{background:var(--surf);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,0.3)}
.logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hinfo h1{font-size:15px;font-weight:600}
.hinfo p{font-size:11px;color:var(--muted);margin-top:1px;font-family:'JetBrains Mono',monospace}
.hbtn{margin-left:auto;background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--muted);cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s;display:flex;align-items:center;gap:5px}
.hbtn:hover{border-color:var(--accent);color:var(--text)}

/* MAIN */
.main{padding:20px;max-width:900px;margin:0 auto}
.sw{position:relative;margin-bottom:8px}
.si2{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
#q{width:100%;background:var(--surf);border:1.5px solid var(--border);border-radius:12px;padding:13px 13px 13px 42px;font-size:15px;font-family:'Sora',sans-serif;color:var(--text);outline:none;transition:border-color .2s}
#q:focus{border-color:var(--accent)}
#q::placeholder{color:var(--muted)}
#cnt{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:10px;min-height:16px}

/* SUGGESTIONS */
#sugg{background:var(--surf);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;max-height:320px;overflow-y:auto;display:none}
.srow{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;transition:background .12s}
.srow:last-child{border-bottom:none}
.srow:hover{background:var(--surf2)}
.sav{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:#fff}
.sn{font-weight:500;font-size:13px}
.ss{font-size:11px;color:var(--muted);margin-top:1px}
.shint{font-size:10px;color:var(--accent2);margin-top:2px;font-family:'JetBrains Mono',monospace}
.nores{text-align:center;padding:18px;color:var(--muted);font-size:13px}

/* FAV PANEL */
#favPanel{display:none;background:var(--surf);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.fav-hdr{padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.05em}
.fav-row{padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;transition:background .12s;font-size:12px}
.fav-row:last-child{border-bottom:none}
.fav-row:hover{background:var(--surf2)}
.fav-empty{padding:14px;text-align:center;color:var(--muted);font-size:12px}

/* CARD */
#card{display:none;background:var(--surf);border:1px solid var(--border);border-radius:16px;overflow:hidden;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* CARD HEADER */
.ch{padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.ch-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.ch h2{font-size:17px;font-weight:700;letter-spacing:-.02em;line-height:1.2}
.ch .dr{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4}
.ch-actions{display:flex;gap:6px;flex-shrink:0}
.fav-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:3px;line-height:1;transition:transform .2s}
.fav-btn:hover{transform:scale(1.2)}
.copy-btn{background:var(--surf2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:11px;color:var(--muted);cursor:pointer;font-family:'Sora',sans-serif;transition:all .2s;white-space:nowrap}
.copy-btn:hover{border-color:var(--accent2);color:var(--accent2)}

/* PROTOCOL PILLS */
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{padding:3px 9px;border-radius:20px;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:500;display:flex;align-items:center;gap:3px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.p-email{background:#202535;color:#60a5fa;border:1px solid #60a5fa22}
.p-impreso{background:#2a2820;color:#ffd166;border:1px solid #ffd16622}
.p-cd{background:#252035;color:#c084fc;border:1px solid #c084fc22}
.p-wet{background:#202535;color:#38bdf8;border:1px solid #38bdf822}
.p-dicom{background:#1e2e28;color:#4ade80;border:1px solid #4ade8022}
.p-dataprius{background:#252035;color:#e879f9;border:1px solid #e879f922}
.p-nube-nueva{background:#222035;color:#a78bfa;border:1px solid #a78bfa22}
.p-diagnocat-always{background:#2e2030;color:#ff6b6b;border:1px solid #ff6b6b40;font-weight:700}
.p-diagnocat-opt{background:#2a1500;color:#fb923c;border:1px solid #fb923c30}
.p-diagnocat-up{background:#1e2e2a;color:#2dd4bf;border:1px solid #2dd4bf22}
.p-afm{background:#2e2030;color:#ff6b6b;border:1px solid #ff6b6b40;font-weight:700}
.p-wapp{background:#1e2e28;color:#4ade80;border:1px solid #4ade8022}

/* CARD BODY */
.cb{padding:16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.cb{grid-template-columns:1fr}.main{padding:12px}}
.fw{grid-column:1/-1}

/* INFO BLOCKS */
.ib{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.il{font-size:9px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:7px}
.iv{font-size:12px;line-height:1.5;color:var(--text)}
.iv.hl{color:var(--accent2);font-weight:500}

/* PRICE GRID - TAC */
.tac-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pi{background:var(--surf);border:1px solid var(--border);border-radius:7px;padding:8px 10px}
.pl{font-size:9px;color:var(--muted);margin-bottom:2px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.05em}
.pv{font-size:16px;font-weight:600;color:var(--accent2);font-family:'JetBrains Mono',monospace;line-height:1.2}
.pv.empty{font-size:11px;color:var(--border);font-weight:400}
.pv.small{font-size:12px}

/* RX PRICES - smaller grid */
.rx-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.rx-item{background:var(--surf);border:1px solid var(--border);border-radius:6px;padding:6px 8px}
.rx-label{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1px}
.rx-val{font-size:13px;font-weight:600;color:var(--blue);font-family:'JetBrains Mono',monospace}
.rx-val.empty{font-size:10px;color:var(--border);font-weight:400}

/* ORTODONCIA SECTION */
.orto-grid{display:flex;flex-direction:column;gap:4px}
.orto-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);gap:8px}
.orto-row:last-child{border-bottom:none}
.orto-name{font-size:12px;color:var(--muted);flex:1}
.orto-price{font-size:13px;font-weight:600;color:var(--purple);font-family:'JetBrains Mono',monospace;white-space:nowrap}

/* EMAILS */
.email-list{display:flex;flex-direction:column;gap:4px}
.email-row{background:var(--surf);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--blue);word-break:break-all;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:6px;justify-content:space-between}
.email-row:hover{background:var(--surf2);border-color:var(--blue)}
.email-copy{font-size:10px;color:var(--muted);flex-shrink:0;margin-top:1px}
.email-tag{font-size:9px;padding:1px 5px;border-radius:4px;background:#222035;color:#a78bfa;font-family:'JetBrains Mono',monospace;white-space:nowrap;margin-bottom:2px}

/* PHONE */
.phone-link{display:flex;align-items:center;gap:7px;background:var(--surf);border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--green);cursor:pointer;transition:all .15s;text-decoration:none;width:100%}
.phone-link:hover{background:var(--surf2);border-color:var(--green)}

/* SPECIAL BLOCKS */
.afm-block{background:#2e2030;border:1px solid #ff6b6b30;border-radius:10px;padding:11px 14px;grid-column:1/-1;display:flex;gap:10px;align-items:flex-start}
.afm-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.afm-text{font-size:12px;color:var(--red);font-weight:600;line-height:1.4}
.afm-sub{font-weight:400;color:#ff6b6b88;font-size:11px;display:block;margin-top:2px}

.dg-always{background:#2e2030;border:1px solid #ff6b6b30;border-radius:10px;padding:11px 14px;grid-column:1/-1}
.dg-opt{background:#2e2a20;border:1px solid #fb923c28;border-radius:10px;padding:11px 14px;grid-column:1/-1}
.dg-up{background:#1e2e2a;border:1px solid #2dd4bf22;border-radius:10px;padding:11px 14px;grid-column:1/-1}
.dg-always .il{color:#ff6b6b55}
.dg-opt .il{color:#fb923c55}
.dg-up .il{color:#2dd4bf55}
.dg-always .iv{color:var(--red);font-weight:600}
.dg-opt .iv{color:#fb923ccc;line-height:1.6}
.dg-up .iv{color:#2dd4bfaa}

.notas-block{background:#2a2818;border:1px solid #ffd16625;border-radius:10px;padding:12px 14px;grid-column:1/-1}
.notas-block .il{color:#ffd16650}
.notas-block .iv{color:#ffd166aa;font-size:12px;line-height:1.6}

/* OTRAS PRUEBAS */
.otras-list{display:flex;flex-direction:column;gap:2px}
.otras-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);gap:6px;flex-wrap:wrap}
.otras-row:last-child{border-bottom:none}
.otras-name{font-size:11px;color:var(--muted);flex:1}
.otras-price{font-size:12px;font-weight:600;color:var(--accent2);font-family:'JetBrains Mono',monospace;white-space:nowrap}

/* NUBE PILLS inside block */
.nube-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.nube-tag{padding:3px 8px;border-radius:6px;font-size:10px;font-family:'JetBrains Mono',monospace}
.nt-dataprius{background:#252035;color:#e879f9;border:1px solid #e879f922}
.nt-nueva{background:#222035;color:#a78bfa;border:1px solid #a78bfa22}

/* EMPTY */
.emp{text-align:center;padding:50px 16px;color:var(--muted)}
.emp .ei{font-size:40px;margin-bottom:12px}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#1e2e28;border:1px solid #4ade8035;border-radius:9px;padding:9px 16px;font-size:12px;color:#4ade80;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.notes-edit-btn{background:none;border:1px solid #ffd16630;border-radius:6px;padding:2px 8px;font-size:10px;color:#ffd16688;cursor:pointer;font-family:"Sora",sans-serif;margin-left:8px}
.notes-edit-btn:hover{border-color:var(--gold);color:var(--gold)}
.notes-edited-badge{display:inline-block;font-size:9px;padding:1px 5px;background:#2a1d00;color:#ffd166;border-radius:4px;font-family:"JetBrains Mono",monospace;margin-left:6px}
.notes-textarea{width:100%;background:var(--bg);border:1px solid #ffd16625;border-radius:8px;padding:10px;font-size:12px;font-family:"Sora",sans-serif;color:#ffd166cc;resize:vertical;min-height:80px;outline:none;margin-top:8px;line-height:1.6}
.notes-actions{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.notes-save-btn{background:#1a1200;border:1px solid #ffd16625;border-radius:6px;padding:5px 12px;font-size:11px;color:var(--gold);cursor:pointer;font-family:"Sora",sans-serif}
.notes-cancel-btn,.notes-reset-btn{background:var(--surf2);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:11px;color:var(--muted);cursor:pointer;font-family:"Sora",sans-serif}
.propose-btn,.envio-btn{background:var(--surf2);border:1px solid var(--border);border-radius:7px;padding:6px 11px;font-size:11px;color:var(--muted);cursor:pointer;font-family:"Sora",sans-serif;transition:all .2s;white-space:nowrap}
.propose-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.envio-btn:hover{border-color:#ea4335;color:#ea4335}
.moverlay{position:fixed;inset:0;background:#000000cc;z-index:200;display:flex;align-items:flex-end;justify-content:center}
.mbox{background:var(--surf);border-radius:16px 16px 0 0;width:100%;max-width:600px;padding:20px;max-height:88vh;overflow-y:auto}
.mttl{font-size:15px;font-weight:700;margin-bottom:4px}
.msub{font-size:12px;color:var(--muted);margin-bottom:16px}
.mfld{margin-bottom:12px}
.mlbl{font-size:10px;color:var(--muted);font-family:"JetBrains Mono",monospace;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;display:block}
.msel,.mta,.minp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;font-family:"Sora",sans-serif;color:var(--text);outline:none}
.msel{cursor:pointer}
.mta{resize:vertical;min-height:70px}
.msel:focus,.mta:focus,.minp:focus{border-color:var(--accent)}
.mresult{background:var(--bg);border:1px solid var(--accent2);border-radius:10px;padding:12px 14px;font-size:12px;font-family:"JetBrains Mono",monospace;color:var(--accent2);white-space:pre-wrap;word-break:break-all;line-height:1.6;margin-top:4px}
.mbtns{display:flex;gap:8px;margin-top:14px}
.mbtn-g{flex:1;background:var(--accent2);border:none;border-radius:9px;padding:11px;font-size:13px;font-weight:600;font-family:"Sora",sans-serif;color:#000;cursor:pointer}
.mbtn-w{flex:1;background:#25d366;border:none;border-radius:9px;padding:11px;font-size:13px;font-weight:600;font-family:"Sora",sans-serif;color:#fff;cursor:pointer}
.mbtn-r{flex:1;background:#ea4335;border:none;border-radius:9px;padding:11px;font-size:13px;font-weight:600;font-family:"Sora",sans-serif;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.mbtn-c{background:var(--surf2);border:1px solid var(--border);border-radius:9px;padding:11px 16px;font-size:13px;font-family:"Sora",sans-serif;color:var(--muted);cursor:pointer}
.schk-list{display:flex;flex-direction:column;gap:5px}
.schk-item{display:flex;align-items:flex-start;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;cursor:pointer;transition:border-color .15s}
.schk-item.on{border-color:var(--accent2)}
.schk-item input{margin-top:2px;flex-shrink:0;accent-color:var(--accent2);width:15px;height:15px;cursor:pointer}
.schk-email{font-size:12px;font-family:"JetBrains Mono",monospace;color:var(--blue);word-break:break-all}
.schk-tag{font-size:10px;color:var(--muted);margin-top:2px}
.sprev{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 15px;font-size:12px;line-height:1.8;white-space:pre-wrap;font-family:"Sora",sans-serif}
.sprev strong{color:var(--accent2);font-weight:700}

/* VISUAL IMPROVEMENTS */
.il{font-size:10px!important;font-weight:700!important;letter-spacing:.12em!important;color:#9ba4c8!important;margin-bottom:9px!important}
.iv{font-size:13px!important;line-height:1.6!important}
.iv.hl{font-size:14px!important;font-weight:600!important}
.ib{border:none!important;border-left:3px solid var(--border);border-radius:0 8px 8px 0!important;padding:12px 15px!important;background:var(--surf2)!important}
.ib.fw{border-left:3px solid var(--accent)!important}
.pi{border:none!important;background:var(--surf)!important;border-radius:8px!important}
.pl{font-size:10px!important;font-weight:600!important;color:#9ba4c8!important;letter-spacing:.06em!important}
.pv{font-size:20px!important;font-weight:700!important}
.pv.small{font-size:13px!important}
.rx-label{font-size:10px!important;font-weight:600!important;color:#9ba4c8!important}
.rx-val{font-size:15px!important;font-weight:700!important}
.email-row{font-size:12px!important;font-weight:500!important}
.email-tag{font-size:10px!important;font-weight:600!important;letter-spacing:.03em!important}
.ch h2{font-size:20px!important;font-weight:800!important}
.ch .dr{font-size:13px!important;color:#9ba4c8!important}
.pill{font-size:11px!important;padding:5px 11px!important;font-weight:600!important}
.phone-link{font-size:14px!important;font-weight:600!important}
.notas-block .il{color:#c8a840!important}
.notas-block .iv{font-size:13px!important;line-height:1.7!important}
.afm-text{font-size:13px!important;font-weight:700!important}
.dg-always .iv,.dg-opt .iv,.dg-up .iv{font-size:13px!important;font-weight:600!important}
.otras-name{font-size:12px!important;color:#b0b8d8!important}
.otras-price{font-size:14px!important;font-weight:700!important}
.orto-name{font-size:12px!important;color:#b0b8d8!important}
.orto-price{font-size:14px!important;font-weight:700!important}

/* AGENDA TAB */
.tabs{display:flex;gap:0;margin-bottom:0;border-bottom:2px solid var(--border)}
.tab{flex:1;padding:12px 0;text-align:center;font-size:13px;font-weight:600;font-family:"Sora",sans-serif;color:var(--muted);cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent2)}
.tab-content{display:none}
.tab-content.active{display:block}

/* AGENDA VIEW */
.agenda-header{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.agenda-date{font-size:15px;font-weight:700;color:var(--text)}
.agenda-nav{display:flex;gap:6px;align-items:center}
.agenda-nav-btn{background:var(--surf2);border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:13px;color:var(--muted);cursor:pointer;font-family:"Sora",sans-serif}
.agenda-nav-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.agenda-new-btn{background:var(--accent2);border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;font-family:"Sora",sans-serif;color:#000;cursor:pointer;white-space:nowrap}
.agenda-loading{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.agenda-empty{text-align:center;padding:40px;color:var(--muted)}
.agenda-empty-icon{font-size:40px;margin-bottom:10px}

/* GOOGLE CALENDAR STYLE */
.gcal-wrap{position:relative;overflow:hidden}
.gcal-time-col{position:absolute;left:0;top:0;width:52px;z-index:2}
.gcal-time-slot{height:60px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:8px;padding-top:2px}
.gcal-time-label{font-size:10px;font-family:"JetBrains Mono",monospace;color:var(--muted);letter-spacing:.03em}
.gcal-grid{margin-left:52px;position:relative;border-left:1px solid var(--border)}
.gcal-hour-line{height:60px;border-bottom:1px solid var(--border);position:relative}
.gcal-hour-line.half::after{content:'';position:absolute;bottom:50%;left:0;right:0;border-bottom:1px dashed var(--border);opacity:.4}
.gcal-now-line{position:absolute;left:0;right:0;height:2px;background:#ea4335;z-index:5}
.gcal-now-dot{position:absolute;left:-5px;top:-4px;width:10px;height:10px;border-radius:50%;background:#ea4335}
.gcal-events{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.gcal-event{position:absolute;border-radius:6px;padding:4px 7px;font-size:11px;line-height:1.3;cursor:pointer;pointer-events:all;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.3);transition:opacity .15s}
.gcal-event:hover{opacity:.85;z-index:10!important}
.gcal-event-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcal-event-time{font-size:10px;opacity:.85;margin-top:1px}

/* COLORS */
.ev-blue{background:#1a73e8;color:#fff}
.ev-green{background:#0f9d58;color:#fff}
.ev-red{background:#db4437;color:#fff}
.ev-yellow{background:#f4b400;color:#000}
.ev-teal{background:#00897b;color:#fff}
.ev-purple{background:#7b1fa2;color:#fff}
.ev-orange{background:#e65100;color:#fff}
.ev-pink{background:#ad1457;color:#fff}

/* SEMANA */
.gcal-week-wrap{display:flex;overflow-x:auto}
.gcal-week-time{width:52px;flex-shrink:0}
.gcal-week-days{display:flex;flex:1;min-width:0}
.gcal-week-day-col{flex:1;min-width:80px;border-left:1px solid var(--border)}
.gcal-week-header{display:flex;margin-left:52px;border-bottom:2px solid var(--border);padding-bottom:6px;margin-bottom:0}
.gcal-week-day-hdr{flex:1;text-align:center;font-size:11px;color:var(--muted);font-family:"JetBrains Mono",monospace;padding:8px 2px 4px}
.gcal-week-day-hdr.hoy{color:var(--accent2)}
.gcal-week-day-num{font-size:18px;font-weight:700;display:block;color:var(--text)}
.gcal-week-day-hdr.hoy .gcal-week-day-num{background:var(--accent2);color:#000;border-radius:50%;width:30px;height:30px;line-height:30px;margin:0 auto}

.agenda-header{padding:16px 20px 8px;display:flex;align-items:center;justify-content:space-between}
.agenda-date{font-size:14px;font-weight:700;color:var(--text)}
.agenda-nav{display:flex;gap:8px;align-items:center}
.agenda-nav-btn{background:var(--surf2);border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:13px;color:var(--muted);cursor:pointer;font-family:"Sora",sans-serif}
.agenda-nav-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.agenda-new-btn{background:var(--accent2);border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;font-family:"Sora",sans-serif;color:#000;cursor:pointer}
.agenda-loading{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.agenda-empty{text-align:center;padding:40px;color:var(--muted)}
.agenda-empty-icon{font-size:40px;margin-bottom:10px}
.cita-slot{padding:10px 20px;border-bottom:1px solid var(--border)}
.cita-hora{font-size:10px;font-family:"JetBrains Mono",monospace;color:var(--muted);margin-bottom:4px;letter-spacing:.05em}
.cita-card{background:var(--surf2);border-radius:10px;padding:11px 14px;border-left:3px solid var(--accent2)}
.cita-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.4}
.cita-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* NUEVA CITA MODAL */
.ncita-overlay{position:fixed;inset:0;background:#000000cc;z-index:300;display:flex;align-items:flex-end;justify-content:center}
.ncita-box{background:var(--surf);border-radius:16px 16px 0 0;width:100%;max-width:600px;padding:20px;max-height:92vh;overflow-y:auto}
.ncita-title{font-size:15px;font-weight:700;margin-bottom:16px}
.ncita-field{margin-bottom:12px}
.ncita-label{font-size:10px;color:var(--muted);font-family:"JetBrains Mono",monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block}
.ncita-input,.ncita-select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;font-family:"Sora",sans-serif;color:var(--text);outline:none}
.ncita-input:focus,.ncita-select:focus{border-color:var(--accent2)}
.ncita-precio{background:var(--bg);border:1px solid var(--accent2);border-radius:8px;padding:10px 12px;font-size:18px;font-weight:700;color:var(--accent2);text-align:center;margin-bottom:4px}
.ncita-proto{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:11px;color:var(--muted);line-height:1.7;white-space:pre-wrap}
.ncita-preview{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;font-family:"JetBrains Mono",monospace;color:var(--text);line-height:1.6;white-space:pre-wrap;margin-top:4px}
.ncita-btns{display:flex;gap:8px;margin-top:16px}
.ncita-save{flex:1;background:var(--accent2);border:none;border-radius:9px;padding:13px;font-size:14px;font-weight:700;font-family:"Sora",sans-serif;color:#000;cursor:pointer}
.ncita-cancel{background:var(--surf2);border:1px solid var(--border);border-radius:9px;padding:13px 16px;font-size:13px;font-family:"Sora",sans-serif;color:var(--muted);cursor:pointer}
.ncita-warn{background:#2a1d00;border:1px solid #ffd16640;border-radius:8px;padding:10px 12px;font-size:12px;color:#ffd166;line-height:1.6;margin-top:4px}
.ncita-afm{background:#2a0808;border:1px solid #ff444440;border-radius:8px;padding:10px 12px;font-size:12px;color:#ff8888;margin-top:4px}
.hora-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px}
.hora-btn{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 4px;font-size:12px;font-family:"JetBrains Mono",monospace;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s}
.hora-btn:hover,.hora-btn.sel{border-color:var(--accent2);color:var(--accent2);background:var(--surf2)}
.prueba-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:6px}
.prueba-btn{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:11px;font-family:"Sora",sans-serif;color:var(--muted);cursor:pointer;text-align:left;transition:all .15s;line-height:1.3}
.prueba-btn:hover,.prueba-btn.sel{border-color:var(--accent2);color:var(--text);background:var(--surf2)}
.prueba-btn-name{font-weight:600;font-size:12px}
.prueba-btn-price{font-size:11px;color:var(--accent2);margin-top:2px}
.clinica-search-wrap{position:relative}
.clinica-sugg{position:absolute;top:100%;left:0;right:0;background:var(--surf);border:1px solid var(--border);border-radius:8px;z-index:50;max-height:200px;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.clinica-sugg-item{padding:10px 14px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border)}
.clinica-sugg-item:hover{background:var(--surf2)}
.clinica-sugg-name{font-weight:600;color:var(--text)}
.clinica-sugg-sub{font-size:10px;color:var(--muted);margin-top:2px}
.agenda-view-btn{background:var(--surf2);border:1px solid var(--border);border-radius:7px;padding:7px 16px;font-size:12px;font-weight:600;font-family:"Sora",sans-serif;color:var(--muted);cursor:pointer;white-space:nowrap}
.agenda-view-btn.active{background:var(--surf);border-color:var(--accent2);color:var(--accent2)}
.semana-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 16px 8px}
.semana-dia{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;min-height:60px}
.semana-dia:hover{border-color:var(--accent2)}
.semana-dia.hoy{border-color:var(--accent2);background:var(--surf)}
.semana-dia.sel{border-color:var(--accent2);background:var(--surf)}
.semana-dia-nombre{font-size:9px;color:var(--muted);font-family:"JetBrains Mono",monospace;letter-spacing:.05em;margin-bottom:3px}
.semana-dia-num{font-size:16px;font-weight:700;color:var(--text)}
.semana-dia-count{font-size:9px;color:var(--accent2);margin-top:3px}
.semana-wrap{margin-bottom:4px}

.color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.color-opt:hover{transform:scale(1.15)}
.color-opt.sel{border-color:var(--text);transform:scale(1.15)}

/* PIN SCREEN */
.pin-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.pin-logo{font-size:52px}
.pin-title{font-size:20px;font-weight:700;color:var(--text);font-family:"Sora",sans-serif}
.pin-sub{font-size:13px;color:var(--muted);font-family:"Sora",sans-serif}
.pin-dots{display:flex;gap:14px;margin:8px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--muted);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--accent2);border-color:var(--accent2)}
.pin-dot.error{background:#ff4444;border-color:#ff4444}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
.pin-btn{background:var(--surf2);border:1px solid var(--border);border-radius:12px;padding:18px 0;font-size:22px;font-weight:600;font-family:"Sora",sans-serif;color:var(--text);cursor:pointer;transition:all .15s;text-align:center}
.pin-btn:hover{background:var(--surf);border-color:var(--accent2)}
.pin-btn:active{transform:scale(.95)}
.pin-del{font-size:18px}
.pin-error{font-size:12px;color:#ff6666;font-family:"Sora",sans-serif;min-height:18px}
</style>
</head>
<body>

</div>

<header>

  </div>

</div>

<div class="ncita-box">

function norm(s){
  if(!s)return'';
  s=s.toLowerCase().replace(/mª/g,'maria').replace(/nº/g,'').replace(/dr\.?\s/g,'doctor ').replace(/dra\.?\s/g,'doctora ');
  try{s=s.normalize('NFD').replace(/[̀-ͯ]/g,'');}catch(e){}
  return s.replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
}

});

// SEARCH
var qEl=document.getElementById('q'),suggEl=document.getElementById('sugg'),cardEl=document.getElementById('card'),empEl=document.getElementById('emp'),cntEl=document.getElementById('cnt');
var cur=null;
qEl.addEventListener('input',search);

function search(){
  var v=qEl.value.trim();
  if(!v){suggEl.style.display='none';cardEl.style.display='none';empEl.style.display='block';cntEl.textContent='';return;}
  var nv=norm(v),words=nv.split(' ').filter(Boolean);
  var scored=[];
  for(var i=0;i<DATA.length;i++){
    var txt=IDX[i];
    if(!words.every(function(w){return txt.indexOf(w)>=0;}))continue;
    var sc=0;
    var nn=norm(DATA[i]['Nombre Clínica']),nd=norm(DATA[i]['Doctor / Ortodoncista']||'');
    if(txt.indexOf(nv)>=0)sc+=10;
    if(nn.indexOf(nv)>=0)sc+=8;
    if(nd.indexOf(nv)>=0)sc+=6;
    if(words.every(function(w){return nn.indexOf(w)>=0;}))sc+=4;
    if(words.every(function(w){return nd.indexOf(w)>=0;}))sc+=3;
    scored.push({i:i,sc:sc});
  }
  scored.sort(function(a,b){return b.sc-a.sc;});
  var res=scored.slice(0,20);
  cntEl.textContent=scored.length+' resultado'+(scored.length!==1?'s':'');
  if(!res.length){suggEl.innerHTML='<div class="nores">Sin resultados</div>';suggEl.style.display='block';cardEl.style.display='none';empEl.style.display='none';return;}
  var h='';
  res.forEach(function(r){
    var c=DATA[r.i];
    var sub=(c['Doctor / Ortodoncista']||c['Dirección']||'').substring(0,55);
    var nn2=norm(c['Nombre Clínica']),nd2=norm(c['Doctor / Ortodoncista']||'');
    var hint=(!words.every(function(w){return nn2.indexOf(w)>=0;})&&words.every(function(w){return nd2.indexOf(w)>=0;}))?'↳ doctor':
             ((!words.every(function(w){return nn2.indexOf(w)>=0;})&&!words.every(function(w){return nd2.indexOf(w)>=0;}))?'↳ notas':'');
    var star=isFav(c['Nombre Clínica'])?'⭐ ':'';
    h+='<div class="srow" onclick="sel('+r.i+')"><div class="sav">'+(c['Nombre Clínica']||'?')[0]+'</div><div style="flex:1"><div class="sn">'+star+c['Nombre Clínica']+'</div>'+(sub?'<div class="ss">'+sub+'</div>':'')+(hint?'<div class="shint">'+hint+'</div>':'')+'</div></div>';
  });
  suggEl.innerHTML=h;
  suggEl.style.display='block';cardEl.style.display='none';empEl.style.display='none';
}

function sel(i){
  cur=DATA[i];suggEl.style.display='none';qEl.value=cur['Nombre Clínica'];cntEl.textContent='';
  render(cur);cardEl.style.display='block';empEl.style.display='none';updFavBtn();
  window.scrollTo({top:0,behavior:'smooth'});
}

function mkPills(c){
  var t=(c['Tipo Envío (Make)']||'').toUpperCase();
  var env=(c['Envío (Instrucciones)']||'').toLowerCase();
  var dg=c['_diagnocat']||'';
  var out=[];
  if(c['AFM'])out.push({l:'⚠ AFM',cls:'p-afm'});
  if(env.indexOf('impreso')>=0||t.indexOf('IMPRESO')>=0)out.push({l:'🖨 Impreso',cls:'p-impreso'});
  if(t.indexOf('EMAIL')>=0||t.indexOf('PDF')>=0)out.push({l:'✉ Email',cls:'p-email'});
  if(t.indexOf('WETRANSFER')>=0)out.push({l:'☁ WeTransfer',cls:'p-wet'});
  if(t.indexOf('DICOM')>=0)out.push({l:'⚕ DICOM',cls:'p-dicom'});
  if(c['Nube Dataprius']==='SÍ'||env.indexOf('dataprius')>=0)out.push({l:'📦 Dataprius',cls:'p-dataprius'});
  if(c['Nube Nueva']==='SÍ'||t.indexOf('NUBE')>=0)out.push({l:'🗄 Nube Nueva',cls:'p-nube-nueva'});
  if(t.indexOf('CD')>=0)out.push({l:'💿 CD',cls:'p-cd'});
  if(env.indexOf('whatsapp')>=0)out.push({l:'💬 WhatsApp',cls:'p-wapp'});
  if(dg==='always')out.push({l:'🧠 Diagnocat SIEMPRE',cls:'p-diagnocat-always'});
  else if(dg==='optional_price')out.push({l:'🧠 Diagnocat +precio',cls:'p-diagnocat-opt'});
  else if(dg==='upload')out.push({l:'🧠 Diagnocat',cls:'p-diagnocat-up'});
  return out;
}

function cpToClipboard(txt,cb){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(cb).catch(function(){fbCopy(txt,cb);});
  } else fbCopy(txt,cb);
}
function fbCopy(txt,cb){
  var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');if(cb)cb();}catch(e){}
  document.body.removeChild(ta);
}

function fmtDate(d){
  var dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var hoy=new Date();hoy.setHours(0,0,0,0);
  var diff=(d-hoy)/86400000;
  var prefix=diff===0?'Hoy, ':diff===1?'Mañana, ':(diff===-1?'Ayer, ':dias[d.getDay()]+' ');
  return prefix+d.getDate()+' de '+meses[d.getMonth()];
}

function agendaNav(dir){
  if(dir===0){agendaDate=new Date();agendaDate.setHours(0,0,0,0);}
  else {
    var days=agendaView==='semana'?7:(agendaView==='3dias'?3:1);
    agendaDate=new Date(agendaDate.getTime()+dir*days*86400000);
  }
  loadAgenda();
}

function padZ(n){return n<10?'0'+n:String(n);}

function loadAgenda(){
  var hoy=new Date();hoy.setHours(0,0,0,0);

  var startDate,endDate;
  if(agendaView==='3dias'){
    startDate=new Date(agendaDate);
    endDate=new Date(agendaDate.getTime()+2*86400000);
    var meses3=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    document.getElementById('agendaDateLabel').textContent=startDate.getDate()+' — '+endDate.getDate()+' '+meses3[endDate.getMonth()];
  } else if(agendaView==='semana'){
    // Get start of week (Monday)
    var dow=agendaDate.getDay();var diff=dow===0?-6:1-dow;
    startDate=new Date(agendaDate.getTime()+diff*86400000);
    endDate=new Date(startDate.getTime()+6*86400000);
    var meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    document.getElementById('agendaDateLabel').textContent=startDate.getDate()+' '+meses[startDate.getMonth()]+' — '+endDate.getDate()+' '+meses[endDate.getMonth()];
  } else {
    startDate=new Date(agendaDate);
    endDate=new Date(agendaDate);
    document.getElementById('agendaDateLabel').textContent=fmtDate(agendaDate);
  }
  endDate.setHours(23,59,59);

  document.getElementById('agendaList').innerHTML='<div class="agenda-loading">⏳ Cargando citas...</div>';

  var startStr=startDate.getFullYear()+'-'+padZ(startDate.getMonth()+1)+'-'+padZ(startDate.getDate())+'T00:00:00';
  var endStr=endDate.getFullYear()+'-'+padZ(endDate.getMonth()+1)+'-'+padZ(endDate.getDate())+'T23:59:59';

  fetch('https://script.google.com/macros/s/AKfycbwll0aBDR3J0HNms-ENu8Hs8VIoPMTGmVyHxkeFrtDZD7y5V9TfJxWdJCXWl61m7o_9/exec?action=events&start='+startStr+'&end='+endStr)
  .then(function(r){return r.json();})
  .then(function(events){
    if(!Array.isArray(events))events=[];
    if(agendaView==='semana')renderSemana(events,startDate);
    else if(agendaView==='3dias')render3Dias(events,startDate);
    else renderAgenda(events);
  })
  .catch(function(e){
    document.getElementById('agendaList').innerHTML='<div class="agenda-empty"><div class="agenda-empty-icon">⚠️</div><p>Error cargando. Comprueba conexión.</p></div>';
    console.log(e);
  });
}

function renderNDias(events,startDate,numDays){

  var colorMap={};var colorIdx=0;
  function getColor(title){var key=title.substring(0,20);if(!colorMap[key])colorMap[key]=COLORS[colorIdx++%COLORS.length];return colorMap[key];}

  var el=document.getElementById('agendaList');

  for(var i=0;i<numDays;i++){

    var isHoy=d.getTime()===hoy.getTime();

function renderGcalDay(el, events, date){
  var HOUR_H=60; // px per hour
  var START_H=7; // start at 7am
  var END_H=22;  // end at 10pm
  var TOTAL=END_H-START_H;

  // Color palette cycling
  var COLORS=['ev-blue','ev-green','ev-red','ev-teal','ev-purple','ev-orange','ev-pink','ev-yellow'];
  var colorMap={};var colorIdx=0;
  function getColor(title){
    var key=title.substring(0,20);
    if(!colorMap[key])colorMap[key]=COLORS[colorIdx++%COLORS.length];
    return colorMap[key];
  }

  // Parse events into minutes
  var parsed=events.map(function(ev){
    var tp=ev.time?ev.time.split(':'):[8,0];
    var ep=ev.end?ev.end.split(':'):[parseInt(tp[0])+1,tp[1]];
    var startMin=parseInt(tp[0])*60+parseInt(tp[1]);
    var endMin=parseInt(ep[0])*60+parseInt(ep[1]);
    if(endMin<=startMin)endMin=startMin+30;
    return {title:ev.title,startMin:startMin,endMin:endMin};
  });

  // Calculate now line
  var now=new Date();
  var nowMin=now.getHours()*60+now.getMinutes();
  var isToday=date.toDateString()===now.toDateString();

  // Build HTML
  var h='<div class="gcal-wrap">';

  // Time column + grid
  h+='<div style="display:flex;position:relative">';
  h+='<div class="gcal-time-col">';
  for(var hr=START_H;hr<=END_H;hr++){
    var label=hr===START_H?'':(hr<12?hr+'am':(hr===12?'12pm':(hr-12)+'pm'));
    h+='<div class="gcal-time-slot"><span class="gcal-time-label">'+label+'</span></div>';
  }
  h+='</div>';

  h+='<div class="gcal-grid" style="flex:1;height:'+(TOTAL*HOUR_H)+'px;position:relative">';
  for(var hr=START_H;hr<END_H;hr++){
    h+='<div class="gcal-hour-line half"></div>';
  }

  // Now line
  if(isToday&&nowMin>=START_H*60&&nowMin<=END_H*60){
    var nowPct=((nowMin-START_H*60)/(TOTAL*60))*100;
    h+='<div class="gcal-now-line" style="top:'+nowPct+'%"><div class="gcal-now-dot"></div></div>';
  }

  // Place events - handle overlaps
  var cols=[];
  parsed.forEach(function(ev){
    var placed=false;
    for(var c=0;c<cols.length;c++){
      var last=cols[c][cols[c].length-1];
      if(last.endMin<=ev.startMin){cols[c].push(ev);ev._col=c;placed=true;break;}
    }
    if(!placed){ev._col=cols.length;cols.push([ev]);}
  });
  var numCols=Math.max(1,cols.length);

  h+='<div class="gcal-events">';
  parsed.forEach(function(ev){
    var top=((ev.startMin-START_H*60)/(TOTAL*60))*100;
    var height=((ev.endMin-ev.startMin)/(TOTAL*60))*100;
    if(top<0){height+=top;top=0;}
    if(top>100)return;
    if(height<1)height=2;
    var left=(ev._col/numCols)*100;
    var width=(1/numCols)*100-1;
    var parsed2=parseEventColor(ev.title);var color=parsed2.color||getColor(ev.title);var dispTitle=parsed2.title;
    h+='<div class="gcal-event '+color+'" style="top:'+top+'%;height:'+height+'%;left:'+left+'%;width:'+width+'%;z-index:'+(ev._col+1)+'">';
    h+='<div class="gcal-event-title">'+dispTitle+'</div>';
    h+='<div class="gcal-event-time">'+ev.time+(ev.end?' - '+ev.end:'')+'</div>';
    h+='</div>';
  });
  h+='</div>';

  h+='</div>';

  // Click handler for empty space
  h+='<div id="gcalClickLayer" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:1" onclick="gcalDayClick(event,'+HOUR_H+','+START_H+','+TOTAL+')"></div>';

  h+='</div></div>';

  if(!parsed.length){
    h+='<div class="agenda-empty"><div class="agenda-empty-icon">📭</div><p style="color:var(--muted)">Sin citas este día</p></div>';
  }

  el.innerHTML=h;

  // Scroll to 9am
  var scrollTo=(9-START_H)*HOUR_H;
  el.scrollTop=scrollTo;
}

}

      var pval=val;var pm2=pval.match(/(\d+)/);
      if(pm2){
        document.getElementById('ncPrecio').value=pm2[1];
        document.getElementById('ncPrecioDisplay').textContent=pm2[1]+'€';
      } else {
        document.getElementById('ncPrecio').value='';
        document.getElementById('ncPrecioDisplay').textContent='—';
      }
      document.getElementById('ncPrecioField').style.display='block';
      document.getElementById('ncPruebaOtra').value='';
      updNcPreview();
    };
    grid.appendChild(btn);
  });
  document.getElementById('ncPruebaField').style.display='block';
  updNcPreview();
}

function updNcFechaLabel(){
  var fval=document.getElementById('ncFecha').value;
  var lbl=document.getElementById('ncFechaLabel');
  if(!fval){lbl.textContent='';return;}
  var d=new Date(fval+'T12:00:00');
  var dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  lbl.textContent='📅 '+dias[d.getDay()]+', '+d.getDate()+' de '+meses[d.getMonth()];
}

function updNcPreview(){
  updNcFechaLabel();
  var pac=document.getElementById('ncPaciente').value.trim().toUpperCase();
  var tel=document.getElementById('ncTelefono').value.trim();
  var clinica=ncClinicaSel?ncClinicaSel['Nombre Clínica']:'';
  var prueba=ncPruebaSel?ncPruebaSel.label:document.getElementById('ncPruebaOtra').value.trim().toUpperCase();
  var precio=document.getElementById('ncPrecio').value.trim();
  var hora=document.getElementById('ncHora').value;

  // Update precio display
  if(precio)document.getElementById('ncPrecioDisplay').textContent=precio+'€';

  if(!pac||!clinica||!prueba){document.getElementById('ncPreview').textContent='';return;}

  var parts=[];
  if(pac)parts.push(pac.toUpperCase());
  if(tel)parts.push(tel);
  if(prueba)parts.push(prueba.toUpperCase());
  if(precio)parts.push(precio+'€');
  if(clinica)parts.push(clinica.toUpperCase());

  // Add proto from textarea
  var protoTxt=document.getElementById('ncProto').value.trim();
  if(protoTxt)parts.push(protoTxt.split('\n')[0]);// first line only in preview

  // Add protocol hints
  if(ncClinicaSel){
    var c=ncClinicaSel;
    if(c['_diagnocat']==='always')parts.push('SUBIR DIAGNOCAT');
    if(c['Nube Dataprius']==='SÍ')parts.push('NUBE DATAPRIUS');
    if(c['Nube Nueva']==='SÍ')parts.push('NUBE NUEVA');
    var env=c['Envío (Instrucciones)']||'';
    if(env.toLowerCase().indexOf('whatsapp')>=0)parts.push('AVISAR WHATSAPP');
    if(env.toLowerCase().indexOf('impreso')>=0)parts.push('IMPRESO');
  }

  document.getElementById('ncPreview').textContent=parts.join(' · ');
}

function guardarCita(){
  var pac=document.getElementById('ncPaciente').value.trim();
  var tel=document.getElementById('ncTelefono').value.trim();
  var clinica=ncClinicaSel?ncClinicaSel['Nombre Clínica']:'';
  var prueba=ncPruebaSel?ncPruebaSel.label:document.getElementById('ncPruebaOtra').value.trim();
  var precio=document.getElementById('ncPrecio').value.trim();
  var hora=document.getElementById('ncHora').value;

  if(!pac||!prueba||!hora){toast('Faltan nombre, prueba u hora');return;}
  if(!clinica)clinica='SIN CLINICA';

  var title=document.getElementById('ncPreview').textContent;
  if(!title)title=(pac.toUpperCase())+(tel?' '+tel:'')+' '+prueba.toUpperCase()+(precio?' '+precio+'€':'')+' '+clinica;
  // Color stored locally only - not sent to calendar

  var fechaVal=document.getElementById('ncFecha').value;
  var d=fechaVal?new Date(fechaVal+'T12:00:00'):new Date(agendaDate);
  var hparts=hora.split(':');
  d.setHours(parseInt(hparts[0]),parseInt(hparts[1]),0,0);
  var end=new Date(d.getTime()+30*60000);

  function padZ2(n){return n<10?'0'+n:String(n);}
  var tz='+02:00';
  var startStr=d.getFullYear()+'-'+padZ2(d.getMonth()+1)+'-'+padZ2(d.getDate())+'T'+padZ2(d.getHours())+':'+padZ2(d.getMinutes())+':00'+tz;
  var endStr=end.getFullYear()+'-'+padZ2(end.getMonth()+1)+'-'+padZ2(end.getDate())+'T'+padZ2(end.getHours())+':'+padZ2(end.getMinutes())+':00'+tz;

  var saveBtn=document.getElementById('ncSaveBtn');
  saveBtn.textContent='⏳ Guardando...';saveBtn.disabled=true;

  fetch('https://script.google.com/macros/s/AKfycbwll0aBDR3J0HNms-ENu8Hs8VIoPMTGmVyHxkeFrtDZD7y5V9TfJxWdJCXWl61m7o_9/exec?action=create&title='+encodeURIComponent(title)+'&start='+encodeURIComponent(startStr)+'&end='+encodeURIComponent(endStr))
  .then(function(r){return r.json();})
  .then(function(data){
    saveBtn.textContent='📅 Crear en calendario';saveBtn.disabled=false;
    toast('✅ CITA CREADA EN EL CALENDARIO');
    closeNuevaCita();
    refreshAfterCreate();
  })
  .catch(function(e){
    saveBtn.textContent='📅 Crear en calendario';saveBtn.disabled=false;
    toast('Error al crear la cita');
  });
}

// ===== PIN =====
var pinHash='4b9a7f50c0bb198c6f5414c5a8459f5d216d34ab521ea94c060ea35cac66f900';
var pinInput='';
var pinLocked=false;

function sha256(str){
  // Simple check using stored hash comparison via subtle crypto
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str))
    .then(function(buf){
      return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
    });
}

function pinPress(d){
  if(pinLocked)return;
  if(pinInput.length>=4)return;
  pinInput+=d;
  updPinDots();
  if(pinInput.length===4){
    sha256(pinInput).then(function(h){
      if(h===pinHash){
        document.getElementById('pinOverlay').style.display='none';
        try{localStorage.setItem('fdn_auth','1');}catch(e){}
      } else {
        pinLocked=true;
        document.querySelectorAll('.pin-dot').forEach(function(d){d.classList.add('error');});
        document.getElementById('pinError').textContent='PIN incorrecto';
        setTimeout(function(){
          pinInput='';pinLocked=false;
          updPinDots();
          document.getElementById('pinError').textContent='';
        },1000);
      }
    });
  }
}

function pinDel(){
  if(pinLocked)return;
  pinInput=pinInput.slice(0,-1);
  updPinDots();
}

function updPinDots(){
  for(var i=0;i<4;i++){
    var dot=document.getElementById('pd'+i);
    dot.classList.remove('filled','error');
    if(i<pinInput.length)dot.classList.add('filled');
  }
}

// Check if already authenticated this session
(function(){
  try{
    if(localStorage.getItem('fdn_auth')==='1'){
      document.getElementById('pinOverlay').style.display='none';
    }
  }catch(e){}
})();

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}
